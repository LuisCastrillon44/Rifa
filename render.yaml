services:
  - type: web
    name: rifa-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JWT_KEY
        sync: false            # secreto, minimo 32 bytes (clave de firma JWT)
      - key: RIFA_DB_CONNECTION
        sync: false            # opcional; si no se define usa la de appsettings.json
      - key: Cors__AllowedOrigins__0
        sync: false            # URL del frontend en produccion
